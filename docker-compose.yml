services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: horoscope_backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - FLASK_SECRET_KEY=super_secret_key_change_me
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB_NAME=horoscope_app
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: horoscope_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: horoscope_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: